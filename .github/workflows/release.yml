name: Build and Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for tags

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tag found, skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Check if this tag points to current commit
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Latest tag $TAG does not point to HEAD, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Check if release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 16
        if: steps.tag.outputs.skip == 'false'
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Build release binary
        if: steps.tag.outputs.skip == 'false'
        run: swift build -c release

      - name: Create .app bundle
        if: steps.tag.outputs.skip == 'false'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"

          APP_DIR="MonitorAgent.app/Contents/MacOS"
          RES_DIR="MonitorAgent.app/Contents/Resources"
          mkdir -p "$APP_DIR" "$RES_DIR"
          cp .build/release/MonitorAgent "$APP_DIR/"
          cp Sources/MonitorAgent/Resources/AppIcon.icns "$RES_DIR/AppIcon.icns"

          cat > MonitorAgent.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MonitorAgent</string>
            <key>CFBundleDisplayName</key>
            <string>Monitor Agent</string>
            <key>CFBundleIdentifier</key>
            <string>com.hd1987.monitor-agent</string>
            <key>CFBundleVersion</key>
            <string>${TAG}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>MonitorAgent</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create zip
        if: steps.tag.outputs.skip == 'false'
        run: ditto -c -k --keepParent MonitorAgent.app MonitorAgent.zip

      - name: Extract changelog
        if: steps.tag.outputs.skip == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: MonitorAgent.zip
